name: Main CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Path filtering — mirrors onboarding-app's check-changed-files
  check-changed-files:
    runs-on: ubuntu-latest
    name: Detect Changed Files
    outputs:
      app_visual: ${{ steps.filter.outputs.app_visual }}
      app_changed: ${{ steps.filter.outputs.app_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            app_visual:
              - 'src/**'
            app_changed:
              - 'src/**'

  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - run: echo "install done"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - run: echo "unit tests passed"

  unit-test-aggregate:
    name: Unit Tests Aggregation
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [unit-tests]
    steps:
      - run: echo "unit test result ${{ needs.unit-tests.result }}"
      - run: exit 1
        if: ${{ needs.unit-tests.result != 'success' }}

  # Skipped by path filter on non-src changes
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [install, check-changed-files]
    if: ${{ needs.check-changed-files.result == 'success' && needs.check-changed-files.outputs.app_changed == 'true' }}
    steps:
      - run: echo "integration tests passed"

  integration-test-aggregate:
    name: Integration Tests Aggregation
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [check-changed-files, integration-tests]
    env:
      RESULT: ${{ needs.integration-tests.result }}
      APP_CHANGED: ${{ needs.check-changed-files.outputs.app_changed }}
    steps:
      - run: echo "integration test result $RESULT, app_changed=$APP_CHANGED"
      - run: exit 1
        if: ${{ needs.check-changed-files.result != 'success' || (env.APP_CHANGED == 'true' && env.RESULT != 'success') }}

  # Skipped by path filter on non-src changes
  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [install, check-changed-files]
    if: ${{ needs.check-changed-files.result == 'success' && needs.check-changed-files.outputs.app_visual == 'true' }}
    steps:
      - run: echo "storybook built"

  playwright-vrt:
    name: Playwright VRT
    runs-on: ubuntu-latest
    needs: [build-storybook]
    steps:
      - run: echo "VRT passed"

  vrt-aggregate:
    name: Playwright VRT Aggregation
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [check-changed-files, playwright-vrt]
    env:
      RESULT: ${{ needs.playwright-vrt.result }}
      VISUAL_CHANGED: ${{ needs.check-changed-files.outputs.app_visual }}
    steps:
      - run: echo "VRT result $RESULT, visual_changed=$VISUAL_CHANGED"
      - run: exit 1
        if: ${{ needs.check-changed-files.result != 'success' || (env.VISUAL_CHANGED == 'true' && env.RESULT != 'success') }}

  merge-coverage-artifacts:
    name: Merge Coverage Artifacts
    runs-on: ubuntu-latest
    if: ${{ always() && needs.unit-tests.result == 'success' }}
    needs: [unit-tests, integration-tests]
    steps:
      - run: echo "coverage merged (unit-tests=${{ needs.unit-tests.result }}, integration-tests=${{ needs.integration-tests.result }})"

  sonar:
    name: Sonar
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.merge-coverage-artifacts.result == 'success' }}
    needs: [merge-coverage-artifacts]
    steps:
      - run: echo "sonar done"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - run: echo "docker built"

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - run: echo "smoke tests passed"

  tag-latest:
    name: Tag Latest
    runs-on: ubuntu-latest
    needs: [docker-build, unit-tests]
    steps:
      - run: echo "tagged latest"

  # --- DEPLOY JOBS (BUG version: no !cancelled()) ---
  deploy-to-dev:
    name: deploy-to-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - docker-build
      - unit-test-aggregate
      - integration-test-aggregate
      - vrt-aggregate
      - smoke-tests
      - tag-latest
      - sonar
    steps:
      - run: echo "deployed to dev"

  deploy-to-staging:
    name: deploy-to-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - docker-build
      - unit-test-aggregate
      - integration-test-aggregate
      - vrt-aggregate
      - smoke-tests
      - tag-latest
      - sonar
    steps:
      - run: echo "deployed to staging"

  smoke-test-staging:
    name: smoke-test-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [deploy-to-staging]
    steps:
      - run: echo "staging smoke test passed"

  deploy-to-prod:
    name: deploy-to-prod
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [docker-build, smoke-test-staging]
    steps:
      - run: echo "deployed to prod"
